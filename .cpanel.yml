---
deployment:
  tasks:
    - export DEPLOYPATH=/home1/jrobak/dev.hippiehost.com
    - /bin/mkdir -p $DEPLOYPATH
    - /usr/bin/rsync -av --delete --exclude='.git/' --exclude='node_modules/' --exclude='vendor/' --exclude='.env' ./ $DEPLOYPATH/
    - /bin/cd $DEPLOYPATH
    - /usr/local/bin/composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
    - /usr/local/bin/php artisan migrate --force
    - /usr/local/bin/php artisan optimize
